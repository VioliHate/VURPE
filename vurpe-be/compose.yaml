version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: vurpe_db
      POSTGRES_USER: vurpeSA
      POSTGRES_PASSWORD: vurpe123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vurpe_db
      SPRING_DATASOURCE_USERNAME: vurpeSA
      SPRING_DATASOURCE_PASSWORD: vurpe123
    ports:
      - "8080:8080"

volumes:
  pgdata:
