<mat-sidenav-container class="sidenav-container">
  <!-- Sidenav -->
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    [style.width.px]="isExpanded ? 200 : 64"
  >
    <mat-nav-list>
      <a mat-list-item (click)="toggleSideNav()">
        <mat-icon matListItemIcon>menu</mat-icon>
        <span *ngIf="isExpanded" class="menu-text">Collapse</span>
      </a>
      <a mat-list-item href="#">
        <mat-icon matListItemIcon>home</mat-icon>
        <span *ngIf="isExpanded" class="menu-text">Home</span>
      </a>
      <a mat-list-item href="#">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span *ngIf="isExpanded" class="menu-text">Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content
    [style.margin-left.px]="(isHandset$ | async) ? 0 : isExpanded ? 200 : 64"
  >
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async"
      >
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>Mini Sidebar App</span>
    </mat-toolbar>

    <div class="content">
      <!-- Page Content Goes Here -->
   <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
