<mat-sidenav-container class="sidenav-container bg-light" autosize>

  <mat-sidenav
    mode="side"
    opened="true"
    [class.expanded]="expanded"
    class="main-sidenav"
  >

    <button mat-icon-button class="expand-toggle" (click)="toggleExpand()">
      <mat-icon>
        {{ expanded ? 'chevron_left' : 'chevron_right' }}
      </mat-icon>
    </button>

    <mat-nav-list>
      @for(element of listMenu;track element){
      <a mat-list-item routerLink="{{element.route}}">
        <mat-icon>{{element.icon}}</mat-icon>
        <span class="nav-link-text p-lg-3"
        [hidden]="!expanded">{{ element.title }}</span>
      </a>
      }
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="content">
    <!-- main page -->
    <router-outlet></router-outlet>

    <div class="page-content">
      <h1>Contenuto principale</h1>
      <p>Il sidenav è {{ expanded ? 'espanso' : 'mini' }}.</p>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
