<div class="min-h-screen bg-light">
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="bi bi-gear-fill"></i>
        <span>Rule Engine</span>
      </a>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" type="button">Cancel</button>
        <button
          class="btn btn-primary btn-sm d-flex align-items-center gap-2"
          type="button"
          (click)="saveRule()"
        >
          <i class="bi bi-save"></i>
          Save Rule
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid p-4">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="card-title mb-0 d-flex align-items-center gap-2">
              <i class="bi bi-filter text-secondary"></i>
              Rule Builder
            </h5>
          </div>
          <div class="card-body p-4">
            <!-- Nome regola -->
            <div class="mb-4">
              <label for="ruleName" class="form-label fw-semibold">Nome regola</label>
              <input
                id="ruleName"
                type="text"
                class="form-control"
                [ngModel]="ruleName()"
                (ngModelChange)="ruleName.set($event)"
              />
            </div>

            <!-- Risk Assessment -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Rischio</label>
              <div class="btn-group w-100" role="group">
                @for (flag of flags; track flag) {
                  <button
                    type="button"
                    (click)="riskFlag.set(flag)"
                    [class.active]="riskFlag() === flag"
                    [ngClass]="{
                      'btn-outline-success': flag === 'LOW',
                      'btn-outline-warning': flag === 'MEDIUM',
                      'btn-outline-danger': flag === 'HIGH',
                    }"
                    class="btn"
                  >
                    {{ flag }}
                  </button>
                }
              </div>
            </div>

            <!-- Severity / Livello -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Livello di severità</label>
              <div class="d-flex align-items-center gap-3">
                <div class="flex-grow-1">
                  <input
                    type="range"
                    class="form-range"
                    min="1"
                    max="10"
                    step="1"
                    [ngModel]="severity()"
                    (ngModelChange)="severity.set($event)"
                  />
                </div>
                <span class="badge bg-secondary fs-6 px-3 py-2"> {{ severity() }}/10 </span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Righ Column: Builder -->
      <div class="col-lg-8">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="card-title mb-0 d-flex align-items-center gap-2">
              <i class="bi bi-filter text-secondary"></i>
              Condition Builder
            </h5>
            <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle"
              >DRAFT</span
            >
          </div>
          <div class="card-body p-4">
            <ng-container
              *ngTemplateOutlet="groupTemplate; context: { $implicit: rule, depth: 0 }"
            ></ng-container>
          </div>
        </div>

        <!-- Generated Logic -->
        <div class="card bg-dark text-light shadow-lg border-0">
          <div
            class="card-header bg-transparent border-secondary d-flex justify-content-between align-items-center py-3"
          >
            <h6 class="card-title mb-0 text-secondary text-uppercase fw-bold small tracking-widest">
              <i class="bi bi-code-slash me-2"></i>
              Generated Logic
            </h6>
            <button
              class="btn btn-link btn-sm text-secondary text-decoration-none p-0 small fw-bold"
            >
              COPY SQL
            </button>
          </div>
          <div class="card-body p-4">
            <div class="ps-4 mt-2 font-monospace small text-info">
              {{ ruleString }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Recursive Group Template -->
<ng-template #groupTemplate let-group let-depth="depth">
  <div
    class="position-relative ps-4 py-2 border-start border-2"
    [ngClass]="group.conjunction === 'AND' ? 'border-dark' : 'border-warning'"
  >
    <!-- Conjunction Toggle -->
    <div class="position-absolute translate-middle-x start-0 top-50">
      <button
        class="btn btn-xs fw-bold shadow-sm border"
        [ngClass]="group.conjunction === 'AND' ? 'btn-dark' : 'btn-warning'"
        (click)="toggleConjunction(group)"
      >
        {{ group.conjunction }}
      </button>
    </div>

    <div class="vstack gap-3">
      @for (item of group.conditions; track item) {
        <div class="position-relative">
          <!-- Render Subgroup -->
          @if (isGroup(item)) {
            <div>
              <ng-container
                *ngTemplateOutlet="groupTemplate; context: { $implicit: item, depth: depth + 1 }"
              ></ng-container>
              <button
                class="btn btn-link btn-sm text-danger position-absolute top-0 end-0 p-0"
                (click)="removeCondition(group, item.id)"
              >
                <i class="bi bi-trash"></i>
              </button>
            </div>
          } @else {
            <div class="card border shadow-sm rule-row">
              <div class="card-body p-2 d-flex flex-wrap align-items-center gap-2">
                <div class="d-flex align-items-center gap-2 flex-grow-1 min-w-150">
                  <i class="bi bi-database text-secondary small"></i>
                  <select
                    class="form-select form-select-sm border-0 bg-transparent shadow-none fw-bold"
                    [(ngModel)]="item.fieldId"
                  >
                    <option *ngFor="let f of fields" [value]="f.id">{{ f.label }}</option>
                  </select>
                </div>

                <div class="vr mx-1 d-none d-md-block" style="height: 20px"></div>

                <select
                  class="form-select form-select-sm border-0 bg-transparent shadow-none text-secondary fst-italic w-auto"
                  [(ngModel)]="item.operator"
                >
                  <option *ngFor="let op of getOperators(item.fieldId)" [value]="op.value">
                    {{ op.label }}
                  </option>
                </select>

                <div class="vr mx-1 d-none d-md-block" style="height: 20px"></div>

                <div
                  class="flex-grow-1 min-w-150"
                  *ngIf="item.operator !== 'is_null' && item.operator !== 'is_not_null'"
                >
                  <input
                    [type]="getFieldType(item.fieldId)"
                    class="form-control form-control-sm bg-light border-secondary-subtle"
                    [(ngModel)]="item.value"
                    placeholder="Value..."
                  />
                </div>

                <button
                  class="btn btn-link btn-sm text-secondary hover-danger p-1 opacity-50"
                  (click)="removeCondition(group, item.id)"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          }
        </div>
      }
    </div>

    <!-- Add Buttons -->
    <div class="mt-3 d-flex gap-3">
      <button
        class="btn btn-link btn-sm text-secondary text-decoration-none fw-bold p-0 d-flex align-items-center gap-1"
        (click)="addCondition(group)"
      >
        <i class="bi bi-plus-lg"></i>
        Add Rule
      </button>
      <button
        class="btn btn-link btn-sm text-secondary text-decoration-none fw-bold p-0 d-flex align-items-center gap-1"
        (click)="addGroup(group)"
      >
        <i class="bi bi-layers"></i>
        Add Group
      </button>
    </div>
  </div>
</ng-template>
