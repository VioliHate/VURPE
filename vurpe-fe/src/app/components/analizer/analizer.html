<!-- Card di Inizio Analisi -->
<div class="card border-0 shadow-sm mb-4 mt-lg-6">
  <div class="card-body py-3">
    <!-- Intestazione stile "FILTRI" -->
    <div class="d-flex align-items-center mb-3">
      <mat-icon class="text-primary me-2" style="font-size: 20px; width: 20px; height: 20px"
        >analytics</mat-icon
      >
      <span class="text-uppercase small panel-title">Analisi</span>
    </div>

    <!-- Bottone START (Verde come da tua richiesta) -->
    <button
      class="btn btn-success px-4 fw-bold d-flex align-items-center shadow-none text-uppercase"
      (click)="startAnalize()"
    >
      <mat-icon class="me-2">play_arrow</mat-icon>
      Start
    </button>
  </div>
</div>

<!--  (Terminale) -->
@if (isStarted) {
  <div class="card border-0 shadow-lg mb-4 bg-dark">
    <div
      class="card-header bg-transparent border-secondary border-opacity-25 d-flex justify-content-between align-items-center py-2"
    >
      <div class="d-flex align-items-center text-white-50 small fw-bold text-uppercase">
        <span class="spinner-border spinner-border-sm text-success me-2" role="status"></span>
        Console Elaborazione
      </div>
    </div>

    <div
      class="card-body p-3 font-monospace"
      style="height: 250px; overflow-y: auto; font-size: 0.85rem; background-color: #1a1a1a"
      #scrollContainer
    ></div>
  </div>
}
