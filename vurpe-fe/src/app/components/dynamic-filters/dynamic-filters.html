<h4>Filtri</h4>
<div class="row">
  <form class="col-4">
    <mat-form-field>
      <mat-label>Scegli:</mat-label>
      <mat-select #select>
        @for (i of list; track i) {
          <mat-option [value]="i">{{ i | camelToTitle }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>

  <form class="col-2">
    <mat-form-field class="example-full-width">
      <mat-label>{{ select.value }}</mat-label>
      <input matInput placeholder="" #Input />
    </mat-form-field>
  </form>

  <button class="col-2" mat-button (click)="addMap(select.value, Input.value)">Aggiungi</button>
</div>
<br />
<div class="d-flex flex-row">
  @for (j of filtersMap() | keyvalue; track j.key) {
    <div class="p-2 border rounded">
      <strong>{{ j.key | camelToTitle }}</strong> → {{ j.value }}
      <button mat-button>
        <mat-icon (click)="deleteFromMap(j.key)">delete</mat-icon>
      </button>
    </div>
  }
  @if (filtersMap().size > 0) {
    <button mat-button (click)="send()">invia</button>
  }
</div>
