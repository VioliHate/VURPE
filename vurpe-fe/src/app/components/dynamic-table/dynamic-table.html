@if (DataSource.data.length !== 0) {
  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="DataSource" matSort (matSortChange)="onSortChange($event)">

      <ng-container matColumnDef="edit" >
        <th mat-header-cell *matHeaderCellDef class="d-sm-table-cell">
          <!-- Pulsante add mock -->
          <button mat-icon-button color="primary" disabled>
            <mat-icon>add</mat-icon>
          </button>
        </th>
      
        <td mat-cell *matCellDef="let element">
          <!-- Menu contestuale mock -->
          <button mat-icon-button>
            <mat-icon>more_vert</mat-icon>
          </button>
        </td>
      </ng-container>

      
      @for (col of columns(); track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            {{ col | camelToTitle }}
          </th>

          <td mat-cell *matCellDef="let element">
            {{ element[col] }}
          </td>
        </ng-container>
      }
<tr mat-header-row *matHeaderRowDef="plainDisplayedColumns()"></tr>
<tr mat-row *matRowDef="let row; columns: plainDisplayedColumns()"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td
          class="mat-cell"
          [attr.colspan]="columns().length"
          style="text-align: center; padding: 20px"
        >
          Nessun dato disponibile.
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="pageInfo()?.totalElements || 0"
      [pageSize]="pageInfo()?.size || 10"
      [pageIndex]="pageInfo()?.number || 0"
      [pageSizeOptions]="[5, 10, 25, 100]"
      (page)="onPageChange($event)"
      aria-label="Seleziona pagina"
    >
    </mat-paginator>
  </div>
} @else {
  <div class="mat-elevation-z8">
    <p>nessun dato da mostrare</p>
  </div>
}
