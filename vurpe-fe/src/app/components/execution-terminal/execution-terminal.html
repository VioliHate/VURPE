<div class="card border-0 shadow-sm overflow-hidden">
  <!-- Header: Semplice e integrato -->
  <div
    class="card-header bg-white py-2 px-3 d-flex align-items-center justify-content-between border-bottom"
  >
    <div class="d-flex align-items-center gap-2">
      <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
      <span class="fw-semibold small text-uppercase tracking-wider">Log Elaborazione</span>
    </div>
    <span class="badge rounded-pill bg-light text-dark border fw-normal">
      {{ messages().length }} eventi
    </span>
  </div>

  <!-- Area Log: Sfondo scuro ma desaturato (usando il tuo dark) -->
  <div
    class="card-body p-0 font-monospace"
    style="height: 280px; background-color: #1e1e1e; overflow-y: auto"
    #scrollContainer
  >
    <div class="list-group list-group-flush">
      @for (msg of messages(); track msg; let last = $last) {
        <div
          class="list-group-item bg-transparent border-0 py-1 px-3 d-flex align-items-start gap-2"
          [class.pb-3]="last"
        >
          <span class="text-light small lh-sm">
            <span class="text-info me-1">›</span> {{ msg.payload }}
          </span>
        </div>
      }
    </div>

    <!-- Indicatore di attività finale -->
    <div class="px-3 py-2 opacity-50">
      <span class="text-info small">_</span>
    </div>
  </div>
</div>
