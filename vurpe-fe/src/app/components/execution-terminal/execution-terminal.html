<div class="card border-0 shadow-lg mb-4 bg-dark">
  <div
    class="card-header bg-transparent border-secondary border-opacity-25 d-flex justify-content-between align-items-center py-2"
  >
    <div class="d-flex align-items-center text-white-50 small fw-bold text-uppercase">
      <span class="spinner-border spinner-border-sm text-success me-2" role="status"></span>
      Console Elaborazione
    </div>
  </div>

  <div
    class="card-body p-3 font-monospace"
    style="height: 250px; overflow-y: auto; font-size: 0.85rem; background-color: #1a1a1a"
    #scrollContainer
  >
    <h3>Messaggi ricevuti ({{ messages().length }})</h3>
    <ul>
      @for (msg of messages(); track msg) {
        <li>{{ msg.payload }}</li>
      }
    </ul>
  </div>
</div>
