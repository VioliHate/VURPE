<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ title() | camelToTitle }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="stats-container">
      @for (item of list(); track $index) {
        <div class="stat-row">
          <span #badge="statusBadge" [appStatusBadge]="item.status" class="stat-label">
            @if (badge.label && badge.label != 'UNKNOWN') {
              {{ badge.label }}
            }
          </span>
          <span class="stat-value">{{ item.count }}</span>
        </div>
      } @empty {
        <p class="no-data">Nessun dato disponibile</p>
      }
    </div>
  </mat-card-content>
</mat-card>
