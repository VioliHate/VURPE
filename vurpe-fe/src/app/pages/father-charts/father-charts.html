<div class="container py-4">
  <div class="row align-items-center mb-4 g-3">
    <div class="col-sm-6">
      <h3 class="fw-bold m-0 text-dark">Analisi Metriche</h3>
      <p class="text-muted small m-0">Dati aggiornati in tempo reale</p>
    </div>
    <div class="col-sm-6 d-flex justify-content-sm-end">
      <mat-form-field appearance="outline" class="compact-select">
        <mat-label>Seleziona Sistema</mat-label>
        <mat-select #select (selectionChange)="onSystemChange(select.value)">
          @for (i of list; track i[0]) {
            <mat-option [value]="i">{{ i[0] }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <!-- Card -->
  @if (typeMetric()) {
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden box-height">
      <div
        class="card-header bg-light border-0 py-3 px-4 d-flex align-items-center justify-content-between"
      >
        <div class="d-flex align-items-center">
          <div class="metric-dot me-2"></div>
          <span class="fw-bold text-secondary small text-uppercase mt-1">{{ typeMetric() }}</span>
        </div>
      </div>

      <div class="card-body p-0">
        <div class="chart-stage">
          <app-charts
            [systemName]="typeMetric()"
            [chartData]="chartData()"
            [chartType]="chartType()"
            [chartLabels]="chartLabels()"
          >
          </app-charts>
        </div>
      </div>
    </div>
  }
</div>
