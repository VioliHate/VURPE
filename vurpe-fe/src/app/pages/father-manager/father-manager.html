<button mat-button (click)="refresh()">Refresh</button>

@if (dataResource.error()) {
  <div class="error">Errore nel caricamento dati</div>
} @else if (dataResource.hasValue()) {
  <app-dynamic-filters
    [list2]="dataResource.value()"
    [conf]="config"
    [(filterMapModel)]="filter"
  ></app-dynamic-filters>
  <app-dynamic-table
    [data]="dataResource.value()"
    [serviceKey]="serviceKey()"
    [config]="config"
    (pageChanged)="onPageChange($event)"
    (sortChanged)="onSortChange($event)"
    (selectedDelete)="deleteRow($event)"
    (selectedDetails)="detailsRow($event)"
    (selectedEdit)="editRow($event)"
    (selectedNew)="addNewRow($event)"
    (viewGraph)="viewGraph($event)"
  >
  </app-dynamic-table>
} @else {
  <div class="loading">Caricamento in corso...</div>
}
