<button
  mat-stroked-button
  [matTooltip]="'Ripristina la lista originale'"
  class="shadow-none mb-3"
  (click)="refresh()"
>
  <mat-icon>restart_alt</mat-icon>
  <span>Resetta</span>
</button>
<app-dynamic-filters
  [data]="dataResource"
  [conf]="config"
  (filterMapModel)="sendFilters($event)"
  [resetTrigger]="filter()"
></app-dynamic-filters>
@if (parentStatus && parentStatus == 'UPLOADED') {
  <app-analizer [fileId]="parentId"></app-analizer>
}
<app-dynamic-table
  [data]="dataResource"
  [serviceKey]="serviceKey()"
  [config]="config"
  (pageChanged)="onPageChange($event)"
  (sortChanged)="onSortChange($event)"
  (selectedDelete)="deleteRow($event)"
  (selectedDetails)="detailsRow($event)"
  (selectedEdit)="editRow($event)"
  (selectedNew)="addNewRow($event)"
  (viewGraph)="viewGraph($event)"
>
</app-dynamic-table>
