@if (dataResource.error()) {
  <div class="error">Errore di caricamento: {{ dataResource.error() }}</div>
}
@else if (dataResource.hasValue()) {
  <!-- Passiamo i dati e ascoltiamo l'evento del paginatore -->
    <!-- Mettiamo il "!" dopo value() per rassicurare TypeScript che il dato c'è -->
  <app-dynamic-table
    [data]="dataResource.value()!"
    (pageChanged)="onPageChange($event)"
    (sortChanged)="onSortChange($event)">
  </app-dynamic-table>
}
@else {
  <!-- Qui potresti mettere uno spinner o skeleton loader -->
  <div class="loading">Caricamento in corso...</div>
}
